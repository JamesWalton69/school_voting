services:
  - type: web
    name: school-voting-system
    runtime: python
    buildCommand: pip install -r requirements.txt && python init_multi_post_db.py
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: voting-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: voting-db
    databaseName: voting
    user: voting_user
    plan: free
